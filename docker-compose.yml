version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
      - "9090:9090"  # Метрики
      - "6060:6060"  # Профилировщик
    environment:
      - LOG_LEVEL=debug
      - LOG_FORMAT=console
      - METRICS_ENABLED=true
      - METRICS_PORT=9090
      - PROFILER_ENABLED=true
      - PROFILER_PORT=6060
      - RESULTS_DIR=/tmp/results
      - PORT=8084
    volumes:
      - ./results:/tmp/results  # Для сохранения результатов
    tmpfs:
      - /tmp  # Временные файлы в RAM
    restart: unless-stopped

  # Опционально: простой HTTP сервер для просмотра PDF результатов
  nginx:
    image: nginx:alpine
    ports:
      - "8085:80"
    volumes:
      - ./results:/usr/share/nginx/html:ro
    depends_on:
      - app