<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delay Argument Calculator</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
    <h1>📊 Численное решение задачи с запаздывающим аргументом</h1>

    <div class="controls">
        <h2>Параметры расчета</h2>

        <div class="form-group">
            <label for="epsilonStart">Начальное ε:</label>
            <input type="number" id="epsilonStart" value="1.0" step="0.1" min="0.1">
        </div>

        <div class="form-group">
            <label for="epsilonMin">Минимальное ε:</label>
            <input type="number" id="epsilonMin" value="1e-8" step="1e-8" min="1e-8">
        </div>

        <div class="form-group">
            <label for="nStart">Начальное N:</label>
            <input type="number" id="nStart" value="128" step="1" min="128">
        </div>

        <div class="form-group">
            <label for="nMax">Максимальное N:</label>
            <input type="number" id="nMax" value="2048" step="1" min="128">
        </div>

        <div class="form-group">
            <label for="delta">δ (запаздывание):</label>
            <input type="number" id="delta" value="0.0" step="0.01">
        </div>

        <div class="form-group">
            <label for="meshType">Тип сетки:</label>
            <select id="meshType"></select>
        </div>

        <button id="calculateBtn" class="btn-primary">🚀 Запустить расчет</button>
    </div>

    <div class="status" id="status" style="display: none;"></div>

    <div class="results" id="results" style="display: none;">
        <h2>Результаты</h2>

        <div class="download-section">
            <a id="pdfLink" target="_blank" class="btn-success">📥 Скачать PDF</a>
        </div>

        <div class="tables">
            <div class="table-container">
                <h3>Классическая схема</h3>
                <div id="classicTable"></div>
            </div>

            <div class="table-container">
                <h3>Модифицированная схема</h3>
                <div id="modifiedTable"></div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="errorChart"></canvas>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
