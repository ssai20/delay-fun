services:
  - type: web
    name: delay-fun
    runtime: docker
    region: frankfurt  # или ближайший к вам
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: RESULTS_DIR
        value: /tmp/results  # Используем временную директорию
      - key: PORT
        value: 10010
    
    autoDeploy: true
    healthCheckPath: /health